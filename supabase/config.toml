[functions."delete-me"]
# We validate the caller inside the function via `auth.getUser()` using the
# provided bearer token. Disabling gateway JWT verification avoids edge cases
# where the gateway rejects valid session JWTs while still keeping the function
# authenticated.
verify_jwt = false

